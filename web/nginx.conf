# Serve o frontend (PWA) buildado — dist/ é enviado por scp pra ./web/dist (não vem do
# git; ver .gitignore). Exposto pra internet pelo Nginx Proxy Manager do VPS
# (engaja.dodile.com.br → engaja-web:80), que também faz o TLS.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Service worker e manifest não podem cachear forte (PWA precisa detectar update rápido).
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Assets com hash no nome (Vite): cache forte, imutável.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA: rota desconhecida cai no index.html (React Router resolve no cliente).
    location / {
        try_files $uri /index.html;
    }
}
